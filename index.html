<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Kas M3CB - Kelurahan KASUNYATAN</title>
<style>
*{box-sizing:border-box; font-family:Arial,sans-serif; margin:0; padding:0;}
html{font-size:18px;}
body{max-width:100%; padding:15px 8px; background:#f5f7fa;}

.judul{text-align:center; color:#1a365d; margin-bottom:15px; padding-bottom:10px; border-bottom:2px solid #2196f3;}
.judul h1{font-size:22px; margin-bottom:5px;}

.box{background:#fff; padding:18px; border-radius:12px; margin-bottom:18px; box-shadow:0 2px 6px rgba(0,0,0,0.06);}
.box h3{color:#1a365d; margin-bottom:12px; font-size:19px;}
.baris-rekap{display:flex; justify-content:space-between; padding:9px 0; border-bottom:1px solid #eee; font-size:17px;}
.baris-rekap:last-child{border:none; font-weight:bold; font-size:18px;}
.hijau{color:#2e7d32;}
.merah{color:#c62828;}
.biru{color:#1565c0;}

.row{margin-bottom:13px;}
label{display:block; margin-bottom:5px; font-weight:bold; color:#333; font-size:16px;}
input,textarea,button{width:100%; padding:11px 10px; font-size:17px; border:1px solid #ccc; border-radius:8px;}
input:focus{outline:none; border-color:#2196f3;}
button{background:#2196f3; color:#fff; border:none; font-weight:bold; cursor:pointer; margin-top:5px;}
button:hover{background:#1976d2;}
.btn-merah{background:#e53935;}
.btn-merah:hover{background:#c62828;}
.btn-abu{background:#607d8b; margin-top:5px;}
.btn-abu:hover{background:#455a64;}

.cari{margin-bottom:12px;}
table{width:100%; border-collapse:collapse; background:#fff; border-radius:10px; overflow:hidden; font-size:15px; margin-top:10px;}
th,td{border:1px solid #e0e0e0; padding:10px 6px; text-align:center;}
th{background:#f0f4f8; font-weight:bold; color:#1a365d;}
</style>
</head>
<body>

<div class="judul">
<h1>🏛️ KAS M3CB - Kelurahan KASUNYATAN</h1>
<p style="font-size:15px; color:#555;">Catatan Donasi & Keuangan</p>
</div>

<!-- 📋 RINGKASAN LAPORAN -->
<div class="box">
<h3>📊 Ringkasan Kas Keseluruhan</h3>
<div id="isiRekapUtama"></div>
</div>

<!-- ➕ TAMBAH PENGELUARAN -->
<div class="box">
<h3>📤 Catat Pengeluaran</h3>
<div class="row">
<label>Keterangan Keperluan</label>
<input type="text" id="ketKeluar" placeholder="Contoh: Konsumsi Rapat / ATK">
</div>
<div class="row">
<label>Nominal Pengeluaran (Rp)</label>
<input type="number" id="nomKeluar" min="0" placeholder="0">
</div>
<button onclick="simpanPengeluaran()">💾 Simpan Pengeluaran</button>
</div>

<!-- ➕ TAMBAH ANGGOTA / PEMASUKAN -->
<div class="box">
<h3>➕ Tambah / Ubah Anggota & Donasi</h3>
<input type="hidden" id="editId">
<div class="row">
<label>Nama Lengkap Anggota</label>
<input type="text" id="nama" placeholder="Masukkan nama" required>
</div>
<div class="row">
<label>Nomor WhatsApp</label>
<input type="tel" id="hp" placeholder="Contoh: 08123456789">
</div>
<div class="row">
<label>Nominal Donasi / Pemasukan (Rp)</label>
<input type="number" id="nominal" min="0" placeholder="0" required>
</div>
<div class="row">
<label>Keterangan Tambahan</label>
<input type="text" id="keterangan" placeholder="Contoh: Bulan Juli / Bantuan Khusus">
</div>
<button onclick="simpanData()">💾 Simpan Data</button>
</div>

<!-- 📑 DAFTAR LENGKAP -->
<div class="box">
<h3>📑 Daftar Anggota & Donasi</h3>
<div class="cari">
<input type="text" id="cariNama" placeholder="🔍 Cari nama anggota..." oninput="tampilDaftar()">
</div>
<table id="tabelAnggota">
<thead>
<tr>
<th>Nama</th>
<th>No. WA</th>
<th>Nominal Donasi</th>
<th>Keterangan</th>
<th>Hubungi</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="isiTabel"></tbody>
</table>
</div>

<div class="box">
<h3>📑 Daftar Pengeluaran</h3>
<div id="daftarPengeluaran"></div>
</div>

<!-- 💾 BACKUP -->
<div class="box">
<h3>💾 Backup Data</h3>
<button class="btn-hijau" onclick="unduhBackup()">📄 Unduh File Backup</button>
<input type="file" id="fileBackup" accept=".json" style="margin:8px 0;">
<button class="btn-abu" onclick="pulihkanBackup()">📥 Pulihkan dari File</button>
</div>

<script>
const KUNCI = 'kasM3cbLengkapKasunyatan';
let daftarAnggota = [];
let daftarKeluar = [];

// MUAT DATA AWAL
function muatData() {
  const lama = localStorage.getItem(KUNCI);
  if(lama) try{const d=JSON.parse(lama); daftarAnggota=d.anggota||[]; daftarKeluar=d.pengeluaran||[];}catch(e){}
  tampilRekap(); tampilDaftar(); tampilKeluar();
}
function simpanPermanen(){localStorage.setItem(KUNCI, JSON.stringify({anggota:daftarAnggota, pengeluaran:daftarKeluar}));}

// RINGKASAN UTAMA
function tampilRekap(){
  const totalMasuk = daftarAnggota.reduce((s,a)=>s+Number(a.nominal),0);
  const totalKeluar = daftarKeluar.reduce((s,a)=>s+Number(a.nominal),0);
  const saldo = totalMasuk - totalKeluar;
  document.getElementById('isiRekapUtama').innerHTML = `
  <div class="baris-rekap"><span>✅ Total Pemasukan / Donasi</span><span class="hijau">Rp ${totalMasuk.toLocaleString('id-ID')}</span></div>
  <div class="baris-rekap"><span>❌ Total Pengeluaran</span><span class="merah">Rp ${totalKeluar.toLocaleString('id-ID')}</span></div>
  <hr style="margin:8px 0; border:1px solid #eee;">
  <div class="baris-rekap"><span>💰 SALDO SAAT INI</span><span class="${saldo>=0?'biru':'merah'}">Rp ${saldo.toLocaleString('id-ID')}</span></div>
  <div class="baris-rekap"><span>Jumlah Anggota Tercatat</span><span>${daftarAnggota.length} orang</span></div>
  `;
}

// ANGGOTA & PEMASUKAN
function simpanData(){
  const idEdit = document.getElementById('editId').value;
  const nama = document.getElementById('nama').value.trim();
  const hp = document.getElementById('hp').value.trim();
  const nominal = Number(document.getElementById('nominal').value)||0;
  const ket = document.getElementById('keterangan').value.trim();
  if(!nama || nominal<=0) return alert('Lengkapi Nama & Nominal Donasi!');
  const obj = {id:idEdit||Date.now(), nama, hp, nominal, keterangan:ket};
  if(idEdit){const i=daftarAnggota.findIndex(x=>x.id==idEdit); if(i>=0)daftarAnggota[i]=obj;}
  else daftarAnggota.push(obj);
  simpanPermanen(); bersihkanForm(); tampilRekap(); tampilDaftar(); alert('✅ Tersimpan!');
}
function tampilDaftar(){
  const kata = document.getElementById('cariNama').value.toLowerCase();
  let html='';
  daftarAnggota.filter(i=>i.nama.toLowerCase().includes(kata)).forEach(i=>{
    const wa = i.hp ? `https://wa.me/62${i.hp.replace(/^0+/,'')}?text=Assalamualaikum%20${encodeURIComponent(i.nama)}` : '-';
    html += `<tr>
      <td>${i.nama}</td><td>${i.hp||'-'}</td><td>Rp ${i.nominal.toLocaleString('id-ID')}</td><td>${i.keterangan||'-'}</td>
      <td>${wa!=='-'?`<a href="${wa}" target="_blank" style="color:#25d366; font-weight:bold;">WA</a>`:'-'}</td>
      <td><button style="padding:5px; font-size:14px;" onclick="editData(${i.id})">Ubah</button> <button class="btn-merah" style="padding:5px; font-size:14px;" onclick="hapusAnggota(${i.id})">Hapus</button></td>
    </tr>`;
  });
  document.getElementById('isiTabel').innerHTML=html;
}
function editData(id){const d=daftarAnggota.find(x=>x.id==id); if(!d)return; document.getElementById('editId').value=d.id; document.getElementById('nama').value=d.nama; document.getElementById('hp').value=d.hp||''; document.getElementById('nominal').value=d.nominal; document.getElementById('keterangan').value=d.keterangan||'';}
function hapusAnggota(id){if(confirm('Yakin hapus?')){daftarAnggota=daftarAnggota.filter(x=>x.id!=id); simpanPermanen(); tampilRekap(); tampilDaftar();}}

// PENGELOUARAN
function simpanPengeluaran(){
  const ket = document.getElementById('ketKeluar').value.trim();
  const nom = Number(document.getElementById('nomKeluar').value)||0;
  if(!ket || nom<=0) return alert('Lengkapi keterangan & nominal!');
  daftarKeluar.unshift({id:Date.now(), keterangan:ket, nominal:nom});
  simpanPermanen(); document.getElementById('ketKeluar').value=''; document.getElementById('nomKeluar').value='';
  tampilRekap(); tampilKeluar(); alert('✅ Pengeluaran dicatat!');
}
function tampilKeluar(){
  let html='';
  daftarKeluar.forEach(i=>html += `<div class="baris-rekap"><span>${i.keterangan}</span><span class="merah">Rp ${i.nominal.toLocaleString('id-ID')}</span> <button style="padding:4px; font-size:13px;" onclick="hapusKeluar(${i.id})">X</button></div>`);
  document.getElementById('daftarPengeluaran').innerHTML = html || '<p style="color:#888;">Belum ada catatan pengeluaran</p>';
}
function hapusKeluar(id){if(confirm('Yakin hapus?')){daftarKeluar=daftarKeluar.filter(x=>x.id!=id); simpanPermanen(); tampilRekap(); tampilKeluar();}}

function bersihkanForm(){document.getElementById('editId').value=''; document.getElementById('nama').value=''; document.getElementById('hp').value=''; document.getElementById('nominal').value=''; document.getElementById('keterangan').value='';}

// BACKUP
function unduhBackup(){const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([JSON.stringify({anggota:daftarAnggota,pengeluaran:daftarKeluar},null,2)],{type:'application/json'})); a.download=`Backup_Kas_M3CB_${new Date().toISOString().slice(0,10)}.json`; a.click();}
function pulihkanBackup(){const f=document.getElementById('fileBackup').files[0]; if(!f)return alert('Pilih file dulu!'); const baca=new FileReader(); baca.onload=e=>{try{const d=JSON.parse(e.target.result); if(!d.anggota||!d.pengeluaran)throw''; if(confirm('GANTI SEMUA DATA?')){daftarAnggota=d.anggota; daftarKeluar=d.pengeluaran; simpanPermanen(); tampilRekap(); tampilDaftar(); tampilKeluar(); alert('✅ Selesai!')}}catch{alert('❌ File salah/rusak!')}}; baca.readAsText(f);}

muatData();
</script>
</body>
</html>
